name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install PyYAML
      run: pip install pyyaml

    - name: Validate plugin.yaml
      run: python3 -c 'import yaml; yaml.safe_load(open("plugin.yaml")); print("OK")'

    - name: Run smoke test
      run: |
        set -o pipefail
        python3 scripts/smoke_test.py 2>&1

    - name: Firewall tests
      run: |
        set -o pipefail
        python3 scripts/test_firewall.py 2>&1

    - name: Verify tools registration
      run: |
        set -o pipefail
        python3 scripts/verify_tools.py 2>&1
