name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install PyYAML
      run: pip install pyyaml
    
    - name: Validate plugin.yaml
      run: python3 -c "import yaml; yaml.safe_load(open('plugin.yaml'))"
    
    - name: Run smoke test
      run: python3 scripts/smoke_test.py 2>&1 | tail -30
      
    - name: Verify tools registration
      run: |
        python3 -c "
import yaml, sys
with open('plugin.yaml') as f:
    p = yaml.safe_load(f)
tools = p.get('provides_tools', [])
print(f'Registered tools: {len(tools)}')
print(f'Version: {p.get("version")}')
if not tools:
    print('WARNING: no tools registered!')
    sys.exit(1)
print('OK: ' + ', '.join(tools[:5]) + ('...' if len(tools) > 5 else ''))
"
